# ============================================================
# OpenClaw Agents вЂ?Multi-Agent Configuration Manifest
# ============================================================
# This file defines all agents, their properties, and routing.
# Used by setup.sh to auto-provision the entire agent fleet.
# ============================================================

# в”Ђв”Ђ Global Settings в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
project:
  name: "openclaw-agents"
  version: "1.0.0"
  description: "Multi-Agent collaborative system for AI research"
  default_model: "zai/glm-5"

# в”Ђв”Ђ Agent Definitions в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Each agent has:
#   - id:          unique agent identifier (used in openclaw commands)
#   - name:        human-readable display name (used in channel identity)
#   - emoji:       visual identifier for quick recognition
#   - role:        brief role description
#   - model:       LLM model to use (override global default)
#   - protected:   if true, core agent that cannot be removed
#   - workspace:   relative workspace path

agents:
  # в”Ђв”Ђ Main Agent (root-level soul.md) в”Ђв”Ђ
  - id: "main"
    name: "рџђѕ OpenClaw"
    emoji: "рџђѕ"
    role: "System orchestrator, audit, and final arbiter"
    model: "zai/glm-5"
    protected: true
    workspace: "."
    default: true

  # в”Ђв”Ђ Core Sub-Agents в”Ђв”Ђ
  - id: "planner"
    name: "рџ§  Planner"
    emoji: "рџ§ "
