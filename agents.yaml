# в”Ђв”Ђ Channel Binding Templates в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Supported channels: feishu, whatsapp, telegram, discord, slack
# peer.kind: "group" or "direct"
# peer.id: channel-specific group/user ID
#
# Feishu IDs:
#   - Group (chat_id): oc_xxxxxxxxx
#   - User  (open_id): ou_xxxxxxxxx
#
# WhatsApp IDs:
#   - Group: 120363999999999999@g.us
#   - User:  +15551234567
#
# Telegram IDs:
#   - Group: -1001234567890
#   - User:  123456789
#
# Discord IDs:
#   - Guild: 1234567890
#   - Channel: 1234567890

bindings:
  # Example: bind all agents to a Feishu group
  # Uncomment and fill in your group ID:
  #
  # - agentId: "main"
  #   match:
  #     channel: "feishu"
  #     peer:
  #       kind: "group"
  #       id: "oc_your_group_id_here"

  # Example: bind a specific agent to a specific peer
  # - agentId: "scout"
  #   match:
  #     channel: "feishu"
  #     peer:
  #       kind: "direct"
  #       id: "ou_your_user_id_here"
